<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사전 서식 태그 예제제</title>
</head>
<body>
    <h1>시의 예</h1>
    <pre>
        <b><mark>김건욱</mark></b>이 불려가는 곳
        <span style="color:red;">그곳에 <strong><em>경기도</em></strong>가 머무네</span>

        <b>설렘</b>이 그치는 곳
        그곳에 <strong>원주</strong>가 쉬어가네네
    </pre>
</body>
</html>
